name: CI - Visign Web Service

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - "visign-llmates/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-web.yml"
      - ".github/workflows/reusable-compose-build-push.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "visign-llmates/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-web.yml"
      - ".github/workflows/reusable-compose-build-push.yml"

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/reusable-compose-build-push.yml
    with:
      service: web
      image-name: visign-web
      local-image: visign-llmates-web:latest
      env-profile: web
      push-images: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
