name: CI - Visign Web Service

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - "visign/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-web.yml"
      - ".github/workflows/reusable-compose-build-push.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "visign/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-web.yml"
      - ".github/workflows/reusable-compose-build-push.yml"

permissions:
  contents: write

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "visign/package-lock.json"
      - name: Install dependencies
        run: cd visign && npm ci
      - name: Run ESLint
        run: cd visign && npm run lint
      - name: Run tests
        # package.json has no "test" script — skip gracefully if missing
        run: |
          cd visign
          if npm run | grep -q '\btest\b'; then
            npm test
          else
            echo "No test script found, skipping."
          fi

  build-and-push:
    needs: [lint-and-test]
    uses: ./.github/workflows/reusable-compose-build-push.yml
    with:
      service: nextjs
      image-name: visign-web
      local-image: visign-llmates-nextjs:latest
      env-profile: web
      kustomize-id: visign-web
      push-images: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
