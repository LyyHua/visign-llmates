name: Reusable Compose Build and Push

on:
  workflow_call:
    inputs:
      service:
        description: Docker Compose service name
        required: true
        type: string
      image-name:
        description: Target image name in ACR (e.g., visign-ai)
        required: true
        type: string
      local-image:
        description: Local image name produced by Compose build
        required: true
        type: string
      env-profile:
        description: Build env profile (ai or web)
        required: true
        type: string
      kustomize-id:
        description: Service ID for kustomization path (e.g., visign-web, visign-ai)
        required: true
        type: string
      push-images:
        description: Push image to ACR after build
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-push.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ inputs.service }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ inputs.service }}-buildx-

      - name: Write build env file
        run: |
          set -euo pipefail
          if [ "${{ inputs.env-profile }}" = "ai" ]; then
            echo "TORCH_COMPUTE=cpu" >> .env
            echo "DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy" >> .env
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> .env
          elif [ "${{ inputs.env-profile }}" = "web" ]; then
            echo "TORCH_COMPUTE=cpu" >> .env
            echo "DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy" >> .env
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> .env
          else
            echo "Unsupported env-profile: ${{ inputs.env-profile }}" >&2
            exit 1
          fi

      - name: Build image with proper Docker cache
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail

          # Create cache directory
          mkdir -p /tmp/.buildx-cache

          # Build with proper cache import and export
          docker buildx bake --file docker-compose.yml ${{ inputs.service }} \
            --set ${{ inputs.service }}.output=type=docker,name=${{ inputs.local-image }} \
            --set ${{ inputs.service }}.cache-from=type=local,src=/tmp/.buildx-cache \
            --set ${{ inputs.service }}.cache-to=type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Login to ACR
        if: inputs.push-images
        uses: azure/docker-login@v1
        with:
          login-server: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}
          username: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_USERNAME || secrets.PROD_ACR_USERNAME }}
          password: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_PASSWORD || secrets.PROD_ACR_PASSWORD }}

      - name: Tag and push image
        id: build-push
        if: inputs.push-images
        run: |
          set -euo pipefail
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
          IMAGE_TAG="${SAFE_BRANCH}-${{ github.sha }}"
          ACR_LOGIN_SERVER="${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}"
          IMAGE_REF="${ACR_LOGIN_SERVER}/${{ inputs.image-name }}:${IMAGE_TAG}"
          docker tag "${{ inputs.local-image }}" "${IMAGE_REF}"
          docker push "${IMAGE_REF}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Install yq
        if: inputs.push-images && github.event_name != 'pull_request'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update kustomization.yaml
        if: inputs.push-images && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.build-push.outputs.image-tag }}"
          ACR_LOGIN_SERVER="${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}"
          IMAGE_NAME="${{ inputs.image-name }}"
          KUSTOMIZE_ID="${{ inputs.kustomize-id }}"

          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            KUSTOMIZE_FILE="k8s-specifications/overlays/dev/${KUSTOMIZE_ID}/kustomization.yaml"
          else
            KUSTOMIZE_FILE="k8s-specifications/overlays/prod/${KUSTOMIZE_ID}/kustomization.yaml"
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Update image name/tag in the overlay kustomization
          yq e -i "
            (.images[] | select(.name == \"${IMAGE_NAME}\") | .newName) = \"${ACR_LOGIN_SERVER}/${IMAGE_NAME}\" |
            (.images[] | select(.name == \"${IMAGE_NAME}\") | .newTag) = \"${IMAGE_TAG}\"
          " "${KUSTOMIZE_FILE}"

          if git diff --quiet "${KUSTOMIZE_FILE}"; then
            echo "No changes to commit"
            exit 0
          fi

          git add "${KUSTOMIZE_FILE}"
          git commit -m "chore(images): update ${IMAGE_NAME} to ${IMAGE_TAG} [skip ci]"

          # Ensure we pull remote changes and rebase to avoid push conflicts
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

          # Retry push up to 3 times (handles concurrent workflow pushes)
          for i in 1 2 3; do
            if git push origin "${GITHUB_REF_NAME}"; then
              echo "Push succeeded"
              break
            fi
            echo "Push failed, rebase and retry (attempt $i)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            sleep 2
            if [ "$i" = "3" ]; then
              echo "Push failed after retries"
              exit 1
            fi
          done