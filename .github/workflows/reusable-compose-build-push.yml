name: Reusable Compose Build and Push

on:
  workflow_call:
    inputs:
      service:
        description: Docker Compose service name
        required: true
        type: string
      image-name:
        description: Target image name in ACR
        required: true
        type: string
      local-image:
        description: Local image name produced by Compose build
        required: true
        type: string
      env-profile:
        description: Build env profile (ai or web)
        required: true
        type: string
      push-images:
        description: Push image to ACR after build
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-push.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write build env file
        run: |
          set -euo pipefail
          case "${{ inputs.env-profile }}" in
            ai)
              if [ "${{ inputs.push-images }}" = "true" ]; then
                cat > .env <<'EOF'
                TORCH_COMPUTE=${{ secrets.TORCH_COMPUTE }}
                DATABASE_URL=dummy-for-ai-build
                OPENAI_API_KEY=dummy-for-ai-build
                NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=dummy-for-ai-build
                CLERK_SECRET_KEY=dummy-for-ai-build
                EOF
              else
                cat > .env <<'EOF'
                TORCH_COMPUTE=cpu
                DATABASE_URL=dummy-for-ai-build
                OPENAI_API_KEY=dummy-for-ai-build
                NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=dummy-for-ai-build
                CLERK_SECRET_KEY=dummy-for-ai-build
                EOF
              fi
              ;;
            web)
              if [ "${{ inputs.push-images }}" = "true" ]; then
                cat > .env <<'EOF'
                TORCH_COMPUTE=cpu
                DATABASE_URL=${{ secrets.DATABASE_URL }}
                OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
                NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
                CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
                EOF
              else
                cat > .env <<'EOF'
                TORCH_COMPUTE=cpu
                DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy
                OPENAI_API_KEY=dummy-for-web-build
                NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=dummy-for-web-build
                CLERK_SECRET_KEY=dummy-for-web-build
                EOF
              fi
              ;;
            *)
              echo "Unsupported env profile: ${{ inputs.env-profile }}" >&2
              exit 1
              ;;
          esac

      - name: Build image with Buildx bake cache
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail
          docker buildx bake --file docker-compose.yml "${{ inputs.service }}" \
            --set "${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.image-name }}" \
            --set "${{ inputs.service }}.cache-to=type=gha,mode=max,scope=${{ inputs.image-name }}" \
            --set "${{ inputs.service }}.output=type=docker"
          docker image inspect "${{ inputs.local-image }}" > /dev/null

      - name: Login to ACR
        if: inputs.push-images
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Tag and push image
        if: inputs.push-images
        run: |
          set -euo pipefail
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
          IMAGE_TAG="${SAFE_BRANCH}-${GITHUB_SHA}"
          IMAGE_REF="${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image-name }}:${IMAGE_TAG}"
          docker tag "${{ inputs.local-image }}" "${IMAGE_REF}"
          docker push "${IMAGE_REF}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Update kustomization.yaml
        if: inputs.push-images
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.build-push.outputs.image-tag }}"
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            KUSTOMIZE_FILE="k8s-specifications/overlays/dev/kustomization.yaml"
          else
            KUSTOMIZE_FILE="k8s-specifications/overlays/app/kustomization.yaml"
          fi
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          if grep -q "${{ inputs.image-name }}:" "$KUSTOMIZE_FILE"; then
            sed -i "/^ - name: ${{ inputs.image-name }}$/,/^ newTag: /{s/^ newTag: .*/ newTag: ${IMAGE_TAG}/}" "$KUSTOMIZE_FILE"
            if git diff --quiet "$KUSTOMIZE_FILE"; then
              echo "No changes"
              exit 0
            fi
            git add "$KUSTOMIZE_FILE"
            git commit -m "chore(images): update ${{ inputs.image-name }} to ${IMAGE_TAG} [skip ci]"
            git push origin "${GITHUB_REF_NAME}"
            echo "Updated $KUSTOMIZE_FILE"
          else
            echo "Image not found in kustomization"
          fi
