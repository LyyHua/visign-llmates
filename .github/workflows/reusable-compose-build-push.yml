name: Reusable Compose Build and Push

on:
  workflow_call:
    inputs:
      service:
        description: Docker Compose service name
        required: true
        type: string
      image-name:
        description: Target image name in ACR (e.g., visign-ai)
        required: true
        type: string
      local-image:
        description: Local image name produced by Compose build
        required: true
        type: string
      env-profile:
        description: Build env profile (ai or web)
        required: true
        type: string
      push-images:
        description: Push image to ACR after build
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build-push.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Write build env file
        run: |
          set -euo pipefail
          if [ "${{ inputs.env-profile }}" = "ai" ]; then
            echo "TORCH_COMPUTE=cpu" > .env
          elif [ "${{ inputs.env-profile }}" = "web" ]; then
            echo "DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy" >> .env
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> .env
          else
            echo "Unsupported env profile: ${{ inputs.env-profile }}" >&2
            exit 1
          fi

      - name: Build image with Buildx bake cache
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail
          docker buildx bake --file docker-compose.yml "${{ inputs.service }}" \
            --set "${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.image-name }}" \
            --set "${{ inputs.service }}.cache-to=type=gha,mode=max,scope=${{ inputs.image-name }}" \
            --set "${{ inputs.service }}.output=type=docker,name=${{ inputs.local-image }}"
          docker image inspect "${{ inputs.local-image }}" > /dev/null

      - name: Login to ACR
        if: inputs.push-images
        uses: azure/docker-login@v1
        with:
          login-server: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}
          username: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_USERNAME || secrets.PROD_ACR_USERNAME }}
          password: ${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_PASSWORD || secrets.PROD_ACR_PASSWORD }}

      - name: Tag and push image
        id: build-push
        if: inputs.push-images
        run: |
          set -euo pipefail
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"
          IMAGE_TAG="${SAFE_BRANCH}-${{ github.sha }}"
          ACR_LOGIN_SERVER="${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}"
          IMAGE_REF="${ACR_LOGIN_SERVER}/${{ inputs.image-name }}:${IMAGE_TAG}"
          docker tag "${{ inputs.local-image }}" "${IMAGE_REF}"
          docker push "${IMAGE_REF}"
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Install yq
        if: inputs.push-images && github.event_name != 'pull_request'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update kustomization.yaml
        if: inputs.push-images && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ steps.build-push.outputs.image-tag }}"
          ACR_LOGIN_SERVER="${{ github.ref_name == 'dev' && secrets.NONPROD_ACR_LOGIN_SERVER || secrets.PROD_ACR_LOGIN_SERVER }}"
          IMAGE_NAME="${{ inputs.image-name }}"

          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            KUSTOMIZE_FILE="k8s-specifications/overlays/dev/kustomization.yaml"
          else
            KUSTOMIZE_FILE="k8s-specifications/overlays/prod/kustomization.yaml"
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Use yq to find the image entry by name and update newName + newTag in-place
          yq e -i "
            (.images[] | select(.name == \"${IMAGE_NAME}\") | .newName) = \"${ACR_LOGIN_SERVER}/${IMAGE_NAME}\" |
            (.images[] | select(.name == \"${IMAGE_NAME}\") | .newTag) = \"${IMAGE_TAG}\"
          " "${KUSTOMIZE_FILE}"

          if git diff --quiet "${KUSTOMIZE_FILE}"; then
            echo "No changes to commit"
            exit 0
          fi

          git add "${KUSTOMIZE_FILE}"
          git commit -m "chore(images): update ${IMAGE_NAME} to ${IMAGE_TAG} [skip ci]"
          
          # Anti-Race-Condition Retry Loop
          MAX_RETRIES=3
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            if git push origin "${GITHUB_REF_NAME}"; then
              echo "Updated ${KUSTOMIZE_FILE} with new tag: ${IMAGE_TAG}"
              break
            else
              echo "Push failed (likely a race condition). Rebasing and retrying..."
              ATTEMPT=$((ATTEMPT+1))
              # Fetch and rebase on top of the other workflow's commit
              git pull --rebase origin "${GITHUB_REF_NAME}"
              if [ $ATTEMPT -eq $MAX_RETRIES ]; then
                echo "Failed to push after $MAX_RETRIES attempts."
                exit 1
              fi
              # Wait a random amount of seconds (1-3) to offset the race
              sleep $((1 + $RANDOM % 3))
            fi
          done