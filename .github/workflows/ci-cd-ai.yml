name: CI - Visign AI Service

on:
  workflow_dispatch:
  push:
    branches: [dev, qa, main]
    paths:
      - "ai-model/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"
  pull_request:
    branches: [dev, qa, main]
    paths:
      - "ai-model/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"

permissions:
  contents: write

concurrency:
  group: ci-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "ai-model/requirements.txt"
      - name: Install lint tools
        run: pip install ruff
      - name: Run ruff
        # Non-blocking: ruff is advisory only, not blocking the build
        run: cd ai-model && ruff check . || true
      - name: Run pytest
        # Install only pytest; full ML deps are too heavy for CI lint/test stage
        run: |
          pip install pytest
          cd ai-model
          if [ -d tests ]; then
            pytest tests/ -v || true
          else
            echo "No tests/ directory found, skipping."
          fi

  build-and-push:
    needs: [lint-and-test]
    uses: ./.github/workflows/reusable-compose-build-push.yml
    with:
      service: fastapi
      image-name: visign-ai
      local-image: visign-llmates-fastapi:latest
      env-profile: ai
      kustomize-id: visign-ai
      push-images: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  update-kustomization:
    needs: [build-and-push]
    uses: ./.github/workflows/reusable-update.yml
    with:
      env-profile: ai
      kustomize-id: visign-ai
      image-tag: ${{ needs.build-and-push.outputs.image-tag }}
    secrets: inherit
