name: CI - Visign AI Service

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - "ai-model/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "ai-model/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"

permissions:
  contents: write

concurrency:
  group: ci-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "ai-model/requirements.txt"
      - name: Install dependencies
        run: cd ai-model && pip install ruff mypy
      - name: Run ruff
        run: cd ai-model && ruff check . || true
      - name: Run mypy
        run: cd ai-model && mypy . || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "ai-model/requirements.txt"
      - name: Install dependencies
        run: cd ai-model && pip install -r requirements.txt pytest
      - name: Run pytest
        run: cd ai-model && pytest tests/ || true

  build-and-push:
    needs: [lint, test]
    uses: ./.github/workflows/reusable-compose-build-push.yml
    with:
      service: fastapi
      image-name: visign-ai
      local-image: visign-llmates-fastapi:latest
      env-profile: ai
      kustomize-id: visign-ai
      push-images: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
