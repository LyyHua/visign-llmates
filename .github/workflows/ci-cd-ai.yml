name: CI - Visign AI Service

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - "visign-llmates/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"
  pull_request:
    branches: [dev, main]
    paths:
      - "visign-llmates/**"
      - "docker-compose.yml"
      - ".github/workflows/ci-cd-ai.yml"
      - ".github/workflows/reusable-compose-build-push.yml"

permissions:
  contents: read

concurrency:
  group: ci-ai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/reusable-compose-build-push.yml
    with:
      service: ai
      image-name: visign-ai
      local-image: visign-llmates-ai:latest
      env-profile: ai
      push-images: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
