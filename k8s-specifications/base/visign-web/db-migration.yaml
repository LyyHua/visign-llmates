apiVersion: batch/v1
kind: Job
metadata:
  name: visign-db-migration
  labels:
    app: visign-db-migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: visign-db-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: visign-web-migrator:latest
          command: ["npm", "run", "db:migrate"]
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visign-secrets
                  key: DATABASE_URL
            - name: SOURCE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visign-secrets
                  key: SOURCE_DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: visign-kv-secrets
