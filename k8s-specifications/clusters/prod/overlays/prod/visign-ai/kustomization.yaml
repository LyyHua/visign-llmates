apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: visign-prod

commonLabels:
  app.kubernetes.io/name: visign-ai
  app.kubernetes.io/instance: prod
  app.kubernetes.io/component: ai

resources:
  - ../../../../../base/visign-ai
  - ../shared/namespace.yaml

patches:
  - path: ../shared/secrets-provider.yaml
  - target:
      kind: Deployment
      name: visign-ai
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: visign-ai

images:
  - name: visign-ai
    newName: visignpacrftll4r7kkywwy.azurecr.io/visign-ai
    newTag: "prod-latest"
