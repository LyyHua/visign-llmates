apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: visign-services
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          # Generator 1: Environments (nonprod=dev+qa, prod)
          - list:
              elements:
                - cluster: nonprod
                  environment: dev
                  namespace: visign-dev
                  branch: dev
                  clusterServer: "https://kubernetes.default.svc"
                - cluster: nonprod
                  environment: qa
                  namespace: visign-qa
                  branch: main
                  clusterServer: "https://kubernetes.default.svc"
                - cluster: prod
                  environment: prod
                  namespace: visign-prod
                  branch: main
                  clusterServer: "https://kubernetes.default.svc"
          # Generator 2: Services
          - list:
              elements:
                - service: visign-web
                - service: visign-ai
  
  template:
    metadata:
      name: "{{service}}-{{environment}}"
    spec:
      project: "{{environment}}-project"
      source:
        repoURL: "https://github.com/LyyHua/visign-llmates"
        targetRevision: "{{branch}}"
        path: "k8s-specifications/clusters/{{cluster}}/overlays/{{environment}}/{{service}}"
      destination:
        server: "{{clusterServer}}"
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
