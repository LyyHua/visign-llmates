apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # Default admin role (built-in)
  policy.default: role:admin

  # Custom RBAC policies
  policy.csv: |
    # Dev access role - can get, sync, list dev applications
    p, role:dev-access, applications, get, dev-project/*, allow
    p, role:dev-access, applications, sync, dev-project/*, allow
    p, role:dev-access, applications, list, dev-project/*, allow
    p, role:dev-access, applications, delete, dev-project/*, allow

    # Prod access role - can get, sync, list prod applications
    p, role:prod-access, applications, get, prod-project/*, allow
    p, role:prod-access, applications, sync, prod-project/*, allow
    p, role:prod-access, applications, list, prod-project/*, allow
    p, role:prod-access, applications, delete, prod-project/*, allow

    # Sub-admin role - full access to all environments
    p, role:sub-admin, applications, *, */*, allow
    p, role:sub-admin, clusters, get, *, allow
    p, role:sub-admin, repositories, get, *, allow

    # Group memberships
    g, developers, role:dev-access
    g, prod-team, role:prod-access
    g, sub-admins, role:sub-admin

  # Builtin policy (optional customization)
  scopes: '[groups]'
