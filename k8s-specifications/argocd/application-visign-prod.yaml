apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: visign-prod
  namespace: argocd
spec:
  project: visign
  source:
    repoURL: https://github.com/LyyHua/visign-llmates
    targetRevision: main
    path: k8s-specifications/overlays/app
  destination:
    server: https://kubernetes.default.svc
    namespace: visign-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
