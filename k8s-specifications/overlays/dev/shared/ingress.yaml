- target:
    kind: Ingress
    name: visign-ingress
  patch: |-
    - op: replace
      path: /spec/tls/0/hosts/0
      value: dev.lyhua.dpdns.org
    - op: replace
      path: /spec/tls/0/secretName
      value: visign-tls-dev
    - op: replace
      path: /spec/rules/0/host
      value: dev.lyhua.dpdns.org
