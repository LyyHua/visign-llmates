apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev environment overlay - reduced resources for cost savings
# Uses 1 replica per service (vs 2 in prod)

resources:
- namespace.yaml
- cluster-role.yaml
- secrets-provider.yaml
- visign-ai-deployment.yaml
- visign-ai-service.yaml
- visign-web-deployment.yaml
- visign-web-service.yaml
- ingress.yaml

# Transform the base namespace for dev
namespace: visign-dev
commonLabels:
  environment: dev

images:
- name: visignacrftll4r7kkywwy.azurecr.io/visign-ai
  newTag: 3439bb10af2602d5db4688dc452cd2b79718e32b
- name: visignacrftll4r7kkywwy.azurecr.io/visign-web
  newTag: 3439bb10af2602d5db4688dc452cd2b79718e32b

# Reduce replicas for dev to save costs
patches:
- target:
    kind: Deployment
    name: visign-ai
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: visign-ai
    spec:
      replicas: 1

- target:
    kind: Deployment
    name: visign-web
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: visign-web
    spec:
      replicas: 1
