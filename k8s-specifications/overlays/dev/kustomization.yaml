apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: visign-dev
resources:
  - ../base
  - secrets-provider.yaml
  - ingress.yaml
patches:
  - target:
      kind: Deployment
      name: visign-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/topologySpreadConstraints
  - target:
      kind: Deployment
      name: visign-ai
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/template/spec/topologySpreadConstraints
images:
  - name: visign-ai
    newName: visignnonprodacrzse7xf.azurecr.io/visign-ai
    newTag: "dev-47d0ac20620b7cf3f3de65a9985e461de57b1be6"
  - name: visign-web
    newName: visignnonprodacrzse7xf.azurecr.io/visign-web
    newTag: "dev-47d0ac20620b7cf3f3de65a9985e461de57b1be6"
