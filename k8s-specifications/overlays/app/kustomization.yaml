apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: visign-prod

resources:
- ../base

commonLabels:
  environment: prod

patches:
- target:
    kind: Deployment
    name: visign-ai
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: visign-ai
    spec:
      replicas: 2
- target:
    kind: Deployment
    name: visign-web
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: visign-web
    spec:
      replicas: 2