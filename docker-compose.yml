services:
  fastapi:
    build:
      context: ./ai-model
      dockerfile: Dockerfile
      args:
        TORCH_COMPUTE: ${TORCH_COMPUTE:?Set TORCH_COMPUTE in .env (cpu or gpu)}
    container_name: fastapi
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./.env

  nextjs:
    build:
      context: ./visign
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
        OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?Set NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY in .env}
    container_name: nextjs
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - MODEL_SERVER_URL=http://fastapi:8000

